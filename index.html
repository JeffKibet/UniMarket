<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unimarket</title>
    <link href="./style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header>
        <h1>Unimarket</h1>
        <p>Buy and sell items with your university community</p>
    </header>
    
    <!-- Navigation -->
    <nav>
        <ul>
            <a href="./index.html">Home</a>
            <a href="./products.html">Products</a>
            <a href="./post.html">Post</a>
            <a href="./contact.html">Contact</a>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <section>
            <h2>Available Items</h2>
            <div id="itemlist"></div>
            
        </section>
    </main>

    <!-- Contact Section -->

    <section>
        <h2>Contact Us</h2>
        <p>If you have any questions or need assistance, please contact us at:</p>
        
        <form>
            <!-- Full Name input -->
            <label for="full-name">Name:</label><br>
            <input type="text" id="full-name" name="full-name" required><br><br>

            <!-- Email input -->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <!-- Message input -->
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" required></textarea><br><br>
            <input type="submit" value="Submit">
        </form>
    </section>
    <footer>
        2026 Unimarket. All rights reserved.
    </footer>
    <script src="./code.js" defer></script>
</body>
</html>
